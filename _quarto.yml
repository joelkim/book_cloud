project:
  type: website
  render:
    - "*.ipynb"

format:
  html:
    toc: true
    toc-depth: 5
    css: styles.css
    page-layout: full
    code-block-bg: true
    code-overflow: wrap
    code-line-numbers: false
    monofont: D2Coding
    language:
      crossref-tbl-title: "표"
    mermaid:
      theme: neutral
    filters:
      - clean-code.lua

bibliography: references.bib
reference-location: margin

website:
  title: "Cloud Book"
  site-url: https://cloudbook.madebykim.kr/
  sidebar:
    style: "docked"
    search: true
    contents:
      - "index.ipynb"
      - section: "아마존 웹 서비스"
        contents:
          - "aws/aws.ipynb"
          - "aws/service.ipynb"
          - "aws/security-category.ipynb"
          - "aws/iam.ipynb"
          - "aws/network-category.ipynb"
          - "aws/vpc.ipynb"
          - "aws/compute-category.ipynb"
          - "aws/ec2.ipynb"
          - "aws/management-category.ipynb"
          - "aws/sm.ipynb"
          - "aws/storage-category.ipynb"
          - "aws/s3.ipynb"
          - "aws/ebs.ipynb"
          - "aws/efs.ipynb"
      - section: "구글 클라우드 플랫폼"
        contents:
          - "gcp/gcp.ipynb"
      - section: "테라폼"
        contents:
          - "terraform/terraform.ipynb"
          - "terraform/tffile.ipynb"
          - "terraform/command.ipynb"
          - "terraform/variable.ipynb"
          - "terraform/state.ipynb"
          - section: "AWS 구현"
            contents:
            - "terraform/aws/role.ipynb"
